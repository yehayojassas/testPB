<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QA comparison</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; background: #d9d3ca; font: 14px system-ui; }
      main { display: grid; grid-template-columns: 390px; gap: 12px; width: 390px; margin: 0 auto; }
      figure { margin: 0; background: white; }
      figcaption { height: 34px; padding: 8px 12px; font-weight: 700; }
      img { display: block; width: 390px; height: 844px; object-fit: fill; }
    </style>
  </head>
  <body>
    <main>
      <figure><figcaption>Référence</figcaption><img src="/qa/reference.png" alt="Référence" /></figure>
      <figure><figcaption>Implémentation</figcaption><img src="/qa/current.png" alt="Implémentation" /></figure>
    </main>
  </body>
</html>
